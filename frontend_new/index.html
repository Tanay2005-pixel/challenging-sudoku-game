<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sudoku Duel — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #0a0a0f;
  --bg2:     #111118;
  --surface: #1e1e2e;
  --border:  #2a2a3e;
  --border2: #3a3a5e;
  --accent:  #e8ff47;
  --accent2: #47ffe8;
  --danger:  #ff4747;
  --muted:   #555570;
  --text:    #e8e8f0;
  --text2:   #9090a8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.35;
  animation: gridMove 18s linear infinite;
}
@keyframes gridMove {
  from { background-position: 0 0; }
  to   { background-position: 60px 60px; }
}
.card {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 36px;
  margin: 20px;
}
.logo { text-align: center; margin-bottom: 32px; }
.logo-ring {
  display: inline-block;
  width: 52px; height: 52px;
  border: 3px solid var(--accent);
  border-radius: 50%;
  position: relative;
  margin-bottom: 14px;
  animation: pulse 2.5s ease-in-out infinite;
}
.logo-ring::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 22px; height: 22px;
  background: var(--accent);
  border-radius: 50%;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(232,255,71,0.4); }
  50%      { box-shadow: 0 0 0 14px rgba(232,255,71,0); }
}
.logo-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  line-height: 0.95;
  color: var(--accent);
  letter-spacing: 4px;
}
.logo-sub { margin-top: 8px; font-size: 13px; color: var(--text2); letter-spacing: 0.5px; }

.tabs {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 28px;
}
.tab-btn {
  flex: 1; padding: 11px;
  background: transparent; border: none;
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.5px;
}
.tab-btn.active { background: var(--accent); color: var(--bg); font-weight: 500; }

.form { display: flex; flex-direction: column; gap: 16px; }
.form.hidden { display: none; }

.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text2); }
.field input {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  padding: 13px 16px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--muted); }

.input-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }

.btn-submit {
  width: 100%; padding: 15px;
  background: var(--accent); border: none;
  border-radius: 8px; color: var(--bg);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 2px;
  cursor: pointer; margin-top: 4px;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-submit:hover   { opacity: 0.88; transform: translateY(-1px); }
.btn-submit:active  { transform: translateY(0); }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.msg {
  text-align: center; font-size: 13px;
  padding: 10px 14px; border-radius: 8px; display: none;
}
.msg.error   { background: rgba(255,71,71,0.1);  color: var(--danger); border: 1px solid rgba(255,71,71,0.3); display: block; }
.msg.success { background: rgba(71,255,232,0.1); color: var(--accent2); border: 1px solid rgba(71,255,232,0.3); display: block; }

.spinner-inline {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.3); border-top-color: var(--bg);
  border-radius: 50%; animation: spin 0.6s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.divider { text-align: center; font-size: 12px; color: var(--muted); margin: 4px 0; }
</style>
</head>
<body>

<div class="bg-grid"></div>

<div class="card">
  <div class="logo">
    <div class="logo-ring"></div>
    <div class="logo-title">SUDOKU<br>DUEL</div>
    <p class="logo-sub">Two players. One board. First to finish wins.</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-login"    onclick="switchTab('login')">Login</button>
    <button class="tab-btn"        id="tab-register" onclick="switchTab('register')">Register</button>
  </div>

  <div class="msg" id="msg"></div>

  <!-- Login Form -->
  <form class="form" id="form-login" onsubmit="doLogin(event)">
    <div class="field">
      <label>Username</label>
      <input id="login-username" type="text" placeholder="Enter your username" autocomplete="username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="login-password" type="password" placeholder="Enter your password" autocomplete="current-password"/>
    </div>
    <button class="btn-submit" type="submit" id="btn-login">LOGIN</button>
    <div class="divider">Don't have an account? <a href="#" style="color:var(--accent); text-decoration:none;" onclick="switchTab('register')">Register</a></div>
  </form>

  <!-- Register Form -->
  <form class="form hidden" id="form-register" onsubmit="doRegister(event)">
    <div class="field">
      <label>Username</label>
      <input id="reg-username" type="text" placeholder="Choose a username" autocomplete="username"/>
      <span class="input-hint">At least 3 characters</span>
    </div>
    <div class="field">
      <label>Display Name</label>
      <input id="reg-displayname" type="text" placeholder="Your display name"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="reg-password" type="password" placeholder="Choose a password" autocomplete="new-password"/>
      <span class="input-hint">At least 4 characters</span>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input id="reg-confirm" type="password" placeholder="Repeat your password"/>
    </div>
    <button class="btn-submit" type="submit" id="btn-register">CREATE ACCOUNT</button>
    <div class="divider">Already have an account? <a href="#" style="color:var(--accent); text-decoration:none;" onclick="switchTab('login')">Login</a></div>
  </form>
</div>

<script>
const API = 'http://localhost:8000';

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('form-login').classList.toggle('hidden',    tab !== 'login');
  document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
  hideMsg();
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className   = 'msg ' + type;
}
function hideMsg() { document.getElementById('msg').className = 'msg'; }

function setLoading(btnId, loading, label) {
  const btn = document.getElementById(btnId);
  btn.disabled  = loading;
  btn.innerHTML = loading ? '<span class="spinner-inline"></span>Please wait...' : label;
}

async function doLogin(e) {
  e.preventDefault();
  hideMsg();
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) { showMsg('Please fill in both fields', 'error'); return; }
  setLoading('btn-login', true, 'LOGIN');
  try {
    const res  = await fetch(`${API}/api/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.detail || 'Invalid username or password', 'error'); return; }
    localStorage.setItem('player', JSON.stringify(data.player));
    showMsg('Login successful! Redirecting...', 'success');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
  } catch (err) {
    showMsg('Cannot reach server. Is the backend running?', 'error');
  } finally {
    setLoading('btn-login', false, 'LOGIN');
  }
}

async function doRegister(e) {
  e.preventDefault();
  hideMsg();
  const username    = document.getElementById('reg-username').value.trim();
  const displayname = document.getElementById('reg-displayname').value.trim();
  const password    = document.getElementById('reg-password').value;
  const confirm     = document.getElementById('reg-confirm').value;
  if (!username || !password || !confirm) { showMsg('Please fill in all fields', 'error'); return; }
  if (username.length < 3)  { showMsg('Username must be at least 3 characters', 'error'); return; }
  if (password.length < 4)  { showMsg('Password must be at least 4 characters', 'error'); return; }
  if (password !== confirm)  { showMsg('Passwords do not match', 'error'); return; }
  setLoading('btn-register', true, 'CREATE ACCOUNT');
  try {
    const res  = await fetch(`${API}/api/register`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, displayname: displayname || username, password })
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.detail || 'Registration failed', 'error'); return; }
    showMsg('Account created! You can now login.', 'success');
    setTimeout(() => switchTab('login'), 1500);
  } catch (err) {
    showMsg('Cannot reach server. Is the backend running?', 'error');
  } finally {
    setLoading('btn-register', false, 'CREATE ACCOUNT');
  }
}

const saved = localStorage.getItem('player');
if (saved) { window.location.href = 'dashboard.html'; }
</script>
</body>
</html>
